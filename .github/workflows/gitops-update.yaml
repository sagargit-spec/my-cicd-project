name: GitOps Update

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: true

jobs:
  update-gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag
        run: |
          TAG="${{ inputs.image_tag }}"
          FILE="environments/dev/demo-app/kustomization.yaml"

          sed -i "s/newTag:.*/newTag: \"${TAG}\"/" "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add environments/dev/demo-app/kustomization.yaml
          git commit -m "dev: update image tag to ${{ inputs.image_tag }}"
          git push
